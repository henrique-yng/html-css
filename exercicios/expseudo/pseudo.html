<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasses e Elementos</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: blueviolet;
        }

        a:hover {
            text-decoration: underline;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Pseudoclasses e elementos</h1>
    <p>Testando pseudoclasses e e elementos através de links</p>
    <ul>
        <li><a href="https://www.youtube.com/" target="_blank">Youtube</a></li>
        <li><a href="https://br.pinterest.com/" target="_blank">Pinterest</a></li>
        <li><a href="https://br.freepik.com/app" target="_blank">Freepik</a></li>
    </ul>
</body>
</html>
