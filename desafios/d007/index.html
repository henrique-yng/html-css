<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Imagens flexíveis</title>
</head>
<body>
    <h1>Imagens Flexíveis</h1>
    <p>Vou testar imagens que se adaptam ao tamanho da tela automaticamente</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/mulher-mar-p.jpg" type="image/jpg">
        <source media="(max-width: 1050px)" srcset="imagens/mulher-mar-m.jpg" type="image/jpg">
        <img src="imagens/mulher-mar-g.jpg" alt="mule no mar">
    </picture>
</body>
</html>
